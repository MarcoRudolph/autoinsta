# Telegram MTProto worker only — not the Next.js app.
# 1) fly apps create YOUR_WORKER_APP_NAME
# 2) fly secrets set -a YOUR_WORKER_APP_NAME POSTGRES_URL=... TELEGRAM_API_ID=... TELEGRAM_API_HASH=... TELEGRAM_SESSION_SECRET=... APP_BASE_URL=https://your-next-host TELEGRAM_CRON_SECRET=...
# 3) fly deploy -a YOUR_WORKER_APP_NAME -c fly.telegram-worker.toml
#
# Replace app name below or pass -a on every command.

app = "REPLACE_WITH_YOUR_FLY_APP_NAME"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.telegram-worker"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpus = 1
