# Same settings as fly.toml — use this only if your Fly UI "Config path" is fly.telegram-worker.toml.
# Prefer fly.toml (Fly’s default). Replace your-worker-app-name with your real Fly app name.

app = "autoinsta"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.telegram-worker"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpus = 1
