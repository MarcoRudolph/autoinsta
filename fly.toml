# Default Fly config path (GitHub / fly deploy). Telegram worker only — not Next.js.
#
# 1) fly apps create <name>
# 2) Set `app` below to that name.
# 3) fly secrets set (never commit secrets — use Fly dashboard or CLI):
#    POSTGRES_URL TELEGRAM_API_ID TELEGRAM_API_HASH TELEGRAM_SESSION_SECRET
#    APP_BASE_URL (site origin only, e.g. https://rudolpho-chat.de — no /api/... path)
#    TELEGRAM_CRON_SECRET or CRON_SECRET
# 4) fly deploy
#
# GitHub: Working directory = ./   Config path = fly.toml

app = "autoinsta"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.telegram-worker"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpus = 1
