name = "rudolpho-chat"
main = ".open-next/worker.js"
compatibility_date = "2025-09-01"
# nodejs_compat_populate_process_env: injects dashboard Variables & Secrets into process.env at runtime
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]
# keep_vars: preserve Variables & Secrets from dashboard across deploys
keep_vars = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true
